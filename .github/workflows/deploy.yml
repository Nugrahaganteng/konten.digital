name: Deploy to VPS

on:
  push:
    branches:
      - master

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            DEPLOY_PATH="/var/www/hnpcomms_com_usr/data/www/hnpcomms.com"
            cd "$DEPLOY_PATH"

            echo "========================================="
            echo "🚀 Starting deployment..."
            echo "========================================="

            # Enable maintenance mode
            echo "🔒 Enabling maintenance mode..."
            php artisan down --secret="deploy-bypass-token" --retry=60

            # Ensure site comes back up even if deploy fails
            trap 'echo "🔓 Bringing site back online..."; php artisan up' EXIT

            # Pull latest code
            echo "📥 Pulling latest changes..."
            git pull origin master

            # Install PHP dependencies (production)
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # Install Node dependencies & build assets
            echo "🔨 Building frontend assets..."
            npm ci --ignore-scripts
            npm run build

            # Laravel optimization
            echo "⚡ Optimizing Laravel..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Run database migrations
            echo "🗄️ Running migrations..."
            php artisan migrate --force

            # Restart queue workers
            echo "🔄 Restarting queue workers..."
            php artisan queue:restart

            # Fix storage permissions
            echo "🔐 Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            # Clear old cached data
            php artisan optimize:clear
            php artisan optimize

            # Disable maintenance mode
            echo "🔓 Disabling maintenance mode..."
            php artisan up

            # Remove trap since we already called `up`
            trap - EXIT

            echo "========================================="
            echo "✅ Deployment completed successfully!"
            echo "========================================="

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::❌ Deployment to VPS failed! Check the logs above."
