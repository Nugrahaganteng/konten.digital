name: Deploy to VPS

on:
  push:
    branches:
      - main

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend assets
        run: npm run build

      - name: PHP Syntax Check
        run: find app config routes database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Validate Routes
        run: |
          cp .env.example .env
          php artisan key:generate --quiet
          php artisan route:list

      - name: Validate Blade Templates
        run: |
          php artisan view:cache

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            PHP="/opt/php84/bin/php"
            COMPOSER=$(which composer)
            DEPLOY_PATH="/var/www/hnpcomms_com_usr/data/www/hnpcomms.com"
            cd "$DEPLOY_PATH"

            echo "========================================="
            echo "🚀 Starting deployment..."
            echo "========================================="

            # Enable maintenance mode
            echo "🔒 Enabling maintenance mode..."
            $PHP artisan down --secret="deploy-bypass-token" --retry=60

            # Ensure site comes back up even if deploy fails
            trap 'echo "🔓 Bringing site back online..."; $PHP artisan up' EXIT

            # Pull latest code
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            # Install PHP dependencies (production)
            echo "📦 Installing Composer dependencies..."
            $PHP $COMPOSER install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # Install Node dependencies & build assets
            echo "🔨 Building frontend assets..."
            npm ci --ignore-scripts
            npm run build

            # Laravel optimization
            echo "⚡ Optimizing Laravel..."
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache
            $PHP artisan event:cache

            # Run database migrations
            echo "🗄️ Running migrations..."
            $PHP artisan migrate --force

            # Restart queue workers
            echo "🔄 Restarting queue workers..."
            $PHP artisan queue:restart

            # Fix storage permissions
            echo "🔐 Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            # Clear old cached data
            $PHP artisan optimize:clear
            $PHP artisan optimize

            # Disable maintenance mode
            echo "🔓 Disabling maintenance mode..."
            $PHP artisan up

            # Remove trap since we already called `up`
            trap - EXIT

            echo "========================================="
            echo "✅ Deployment completed successfully!"
            echo "========================================="

      - name: Send Notification Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.hnpcomms.com
          server_port: 465
          secure: true
          ignore_cert: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Deployment Successful: konten.digital"
          to: ${{ secrets.MAIL_TO_ADDRESS }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <div style="font-family: sans-serif; line-height: 1.6;">
                <h2 style="color: #2e7d32;">✅ Deployment to Production completed successfully!</h2>
                <p>
                    <strong>Repository:</strong> ${{ github.repository }}<br>
                    <strong>Branch:</strong> ${{ github.ref_name }}<br>
                    <strong>Commit:</strong> ${{ github.event.head_commit.message }}<br>
                    <strong>Deployed By:</strong> ${{ github.actor }}
                </p>
                <hr style="border: 1px solid #eee;">
                <h3>Tindakan Tambahan</h3>
                <p>Jika kamu memiliki Seeder baru yang perlu dijalankan, klik tombol di bawah ini:</p>
                <a href="https://hnpcomms.com/system-deploy/run-seeder?token=${{ secrets.DEPLOY_SECRET_TOKEN }}&seeder=DatabaseSeeder" 
                   style="background-color: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">
                   🚀 Jalankan DatabaseSeeder
                </a>
                <p style="font-size: 12px; color: #666; margin-top: 15px;">
                    *Kamu bisa mengganti parameter <code>seeder=DatabaseSeeder</code> di URL secara manual jika ingin menjalankan class seeder spesifik.
                </p>
                <hr style="border: 1px solid #eee;">
                <p>
                    <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color: #1976d2;">
                        🔍 View Workflow Run Log
                    </a>
                </p>
            </div>

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::❌ Deployment to VPS failed! Check the logs above."
